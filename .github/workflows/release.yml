name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          REPO=$(basename "$GITHUB_REPOSITORY")
          git archive \
            --prefix="${REPO}/" \
            --format=zip \
            HEAD \
            -o "${REPO}-${GITHUB_REF_NAME}.zip"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="QuestLogCollapse-${TAG}.zip"

          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE 'alpha|beta|rc'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" &>/dev/null; then
            # Release already exists (e.g. created manually) — just attach the zip.
            gh release upload "$TAG" "$ZIP" --clobber
          else
            # No release yet — create it with the zip attached.
            gh release create "$TAG" --title "$TAG" $PRERELEASE_FLAG "$ZIP"
          fi
